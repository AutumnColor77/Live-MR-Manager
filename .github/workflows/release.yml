name: "release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Live MR Manager (Beta) ${{ github.ref_name }} - AI Vocal Remover & Live Backing Track Manager with Lyrics Sync."
          releaseBody: |
            🎙️ Live MR Manager(Beta) ${{ github.ref_name }} 릴리즈

            AI 기반 오디오 분리 및 정밀 제어를 지원하는 Live MR Manager(Beta)의 최신 릴리즈입니다.

            주요 업데이트 사항:
            - 앱 전역 다크/라이트 테마를 도입하고, 아이보리 톤 라이트 팔레트 + 색상 토큰 기반 리디자인으로 주요 화면(메인/모달/토스트/Lyric Sync/OBS 오버레이)의 저대비 및 톤 불일치 문제를 전반적으로 정리했습니다.
            - Lyric Sync 및 곡 정보 관리자 화면의 가독성을 개선했습니다. (파형/세그먼트 시인성, 테이블 대비/열 너비/버튼 정렬)
            - YouTube 추가 UX를 개선했습니다. (`정보 가져오기` 로딩 표시, 버튼 정렬, 동일 영상(video ID) 중복 등록 차단)
            - 안정성과 사용성을 개선했습니다. (목록 자동 복구 통계 표시, 기본 우클릭 메뉴 차단, 입력창 전용 편집 메뉴 제공)
          releaseDraft: true
          prerelease: false
          args: "--verbose"
