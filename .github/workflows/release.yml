name: "release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundleArgs: --bundles nsis
          - platform: macos-latest
            rustTarget: aarch64-apple-darwin
            bundleArgs: --bundles dmg,app --target aarch64-apple-darwin
          # macos-13 runner 이미지는 GitHub에서 폐기됨 (2025-12-04). Intel(x86_64) 빌드는 macos-15-intel 사용.
          # https://github.blog/changelog/2025-09-19-github-actions-macos-13-runner-image-is-closing-down/
          - platform: macos-15-intel
            rustTarget: x86_64-apple-darwin
            bundleArgs: --bundles dmg,app --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: add rust target
        if: matrix.rustTarget != ''
        run: rustup target add ${{ matrix.rustTarget }}

      - name: install frontend dependencies
        run: npm install

      - name: cleanup stale macOS dmg artifacts
        if: matrix.platform == 'macos-latest' || matrix.platform == 'macos-15-intel'
        run: |
          set +e
          hdiutil info | awk '/\/Volumes\/dmg\./ {print $1}' | xargs -I {} hdiutil detach {} -force
          rm -f src-tauri/target/release/bundle/macos/rw.*.dmg
          rm -f src-tauri/target/release/bundle/dmg/*.dmg
          set -e

      - name: build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Live MR Manager (Beta) ${{ github.ref_name }} - AI Vocal Remover & Live Backing Track Manager with Lyrics Sync."
          releaseBody: |
            🎙️ Live MR Manager(Beta) ${{ github.ref_name }} 릴리즈

            AI 기반 오디오 분리 및 정밀 제어를 지원하는 Live MR Manager(Beta)의 최신 릴리즈입니다.

            macOS 설치 파일 선택 가이드:
            - `aarch64-apple-darwin` 표기가 포함된 파일: Apple Silicon(M1/M2/M3/M4)용
            - `x86_64-apple-darwin` 표기가 포함된 파일: Intel Mac용
          releaseDraft: true
          prerelease: false
          args: "--verbose ${{ matrix.bundleArgs }}"
