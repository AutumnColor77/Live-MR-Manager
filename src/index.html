<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live MR Manager | Performer Dash</title>
  </head>

  <body>
    <!-- 배경 글로우 효과 -->
    <div class="bg-glow"></div>

    <!-- 파일 드롭존 오버레이 삭제됨 (전역 기능 제거) -->

    <!-- 사이드바 -->
    <nav class="sidebar">
      <div class="logo">
        <span class="logo-icon">🎙️</span>
        <span class="logo-text">Live MR Manager</span>
      </div>
      
      <div class="nav-group">
        <label class="nav-label">Main</label>
        <div class="nav-item active" id="nav-library">
          <i class="icon-library"></i>
          <span>Library</span>
        </div>
        <div class="nav-item" id="nav-youtube">
          <i class="icon-youtube"></i>
          <span>YouTube</span>
        </div>
        <div class="nav-item" id="nav-local">
          <i class="icon-folder"></i>
          <span>My Musics</span>
        </div>
      </div>

      <div class="nav-group secondary">
        <label class="nav-label">System</label>
        <div class="nav-item" id="nav-tasks">
          <span>Active Tasks</span>
          <span class="task-count" id="task-badge">0</span>
        </div>
        <div class="nav-item" id="nav-settings">
          <span>Settings</span>
        </div>
      </div>
    </nav>

    <!-- 메인 컨텐츠 영역 -->
    <main class="viewport">
      <header class="top-bar">
        <div class="view-header">
          <h1 id="view-title">Music Library</h1>
          <div class="stream-timer">
            <span class="timer-dot"></span>
            <span id="stream-time">00:00:00</span>
          </div>
        </div>
        
        <div class="channel-settings">
          <div class="setting-item">
            <label>Title</label>
            <input type="text" id="stream-title-input" placeholder="방송 제목을 입력하세요" value="Live MR Test Stream">
          </div>
          <div class="setting-item">
            <label>Category</label>
            <select id="stream-category-select">
              <option>Music</option>
              <option>Talk</option>
            </select>
          </div>
        </div>

        <div class="user-info">
          <span class="status-indicator online"></span>
          <span class="status-text">OBS Connected</span>
        </div>
      </header>

      <div class="scroll-area">
        <!-- 유튜브 입력 섹션 -->
        <section class="search-section" id="youtube-search">
          <div class="search-glass">
            <input type="text" class="search-input" placeholder="YouTube URL을 입력하세요..." id="yt-url-input" />
            <button class="primary-btn" id="yt-fetch-btn">정보 가져오기</button>
          </div>
        </section>

        <!-- My Musics 전용 드롭존 -->
        <section class="local-drop-section" id="local-drop-section">
          <div class="drop-box" id="local-drop-box">
            <div class="drop-box-content">
              <span class="drop-box-icon">🎵</span>
              <span class="drop-box-text">보관할 음악 파일을 여기에 드롭하세요</span>
              <span class="drop-box-hint">MP3, WAV, FLAC 지원</span>
            </div>
          </div>
        </section>

        <!-- 곡 그리드 -->
        <div class="song-grid" id="song-grid">
          <!-- 곡 카드가 동적으로 생성됩니다 -->
        </div>
      </div>
    </main>

    <!-- 퍼포머 컨트롤 도크 (하단 고정) -->
    <footer class="control-dock">
      <div class="dock-inner">
        <!-- 현재 재생 중인 곡 정보 -->
        <div class="now-playing">
          <div class="mini-thumb" id="dock-thumb"></div>
          <div class="song-info">
            <div class="song-name" id="dock-title">재생 중인 곡 없음</div>
            <div class="song-artist" id="dock-artist">파일을 선택하세요</div>
          </div>
        </div>

        <!-- AI 처리 섹션 -->
        <div class="ai-processing">
          <div class="ai-item" title="Roformer Stem Separation">
            <span class="ai-label">VOCAL</span>
            <label class="switch">
              <input type="checkbox" id="toggle-vocal" checked>
              <span class="slider round"></span>
            </label>
          </div>
          <div class="ai-divider"></div>
          <div class="ai-item" title="WhisperX Lyrics Sync">
            <span class="ai-label">LYRIC</span>
            <label class="switch">
              <input type="checkbox" id="toggle-lyric">
              <span class="slider round"></span>
            </label>
          </div>
        </div>

        <!-- 실시간 오디오 제어 (2단 구성) -->
        <div class="audio-panel">
          <!-- 상단: 피치 & 템포 -->
          <div class="control-row">
            <div class="control-group">
              <div class="control-header">
                <span>PITCH</span>
                <span class="val-display" id="pitch-val">0.0</span>
              </div>
              <input type="range" min="-12" max="12" step="0.5" value="0" class="range-slider" id="pitch-slider">
            </div>
            <div class="control-group">
              <div class="control-header">
                <span>TEMPO</span>
                <span class="val-display" id="tempo-val">1.0x</span>
              </div>
              <input type="range" min="0.5" max="1.5" step="0.05" value="1.0" class="range-slider" id="tempo-slider">
            </div>
          </div>
          
          <!-- 하단: 마스터 볼륨 -->
          <div class="control-row volume-row">
            <div class="volume-container">
              <svg class="icon-volume" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              </svg>
              <input type="range" min="0" max="100" value="80" class="range-slider volume-slider">
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script type="module" src="/main.js"></script>
  </body>
</html>
